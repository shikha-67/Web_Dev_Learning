<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- row wise content -->
    
    <div class="parent_1">
        <h3>row wise content</h3>
        <label>Name :
            <input type="text">
        </label>
         <label>Age :
            <input type="number">
        </label>
         <label>Password :
            <input type="password">
        </label>
        </div>
<hr><br>

<!-- row-reverse content -->
        <div class="parent_2">
            <h3>row-reverse content</h3>
        <label>Name :
            <input type="text">
        </label>
         <label>Age :
            <input type="number">
        </label>
         <label>Password :
            <input type="password">
        </label>
        </div>
<hr><br>

<!-- column wise content -->
        <div class="parent_3">
            <h3>column wise content</h3>
        <label>Name :
            <input type="text">
        </label>
         <label>Age :
            <input type="number">
        </label>
         <label>Password :
            <input type="password">
        </label>
        </div>
<hr><br>

<!-- column-reverse wise content -->
        <div class="parent_4">
            <h3>column-reverse content</h3>
        <label>Name :
            <input type="text">
        </label>
         <label>Age :
            <input type="number">
        </label>
         <label>Password :
            <input type="password">
        </label>
    </div>
</body>
</html>
